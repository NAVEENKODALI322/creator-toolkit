<body>
<header class="header">
<div class="logo">🚀 Creator Toolkit</div>
<nav class="main-nav">

</nav>
</header>
<div class="container">
<div class="card">
<h2 style="text-align:center;margin-bottom:20px;">🏷️ Hashtag Generator</h2>
<input type="text" id="keyword" placeholder="Enter video topic">
  <div class="platform-selection">

<label>Select Platform</label>

<select id="platform">
    <option value="YouTube">YouTube</option>
    <option value="Instagram">Instagram</option>
    <option value="TikTok">TikTok</option>
</select>

</div>
<button class="format-btn" onclick="generateHashtags()">Generate Hashtags</button>
<div class="output" id="result"></div>
<button class="copy-btn" onclick="copyHashtags()">Copy Hashtags</button>
</div>
</div>

<script>
async function generateHashtags() {
  const topic = document.getElementById("keyword").value.trim();
  const outputBox = document.getElementById("result");
  if (!topic) { outputBox.innerHTML = "⚠️ Please enter a topic!"; return; }
  outputBox.innerHTML = "⏳ Generating AI Hashtags...";
  const apiKey = "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";
  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [
          { role: "system", content: "You are a social media growth expert." },
          { role: "user", content: `Generate 30 highly searched hashtags for "${topic}".
Requirements:
- Relevant to YouTube, Instagram and Reels.
- Include broad hashtags.
- Include niche hashtags.
- Include trending creator hashtags.
- No explanations.
- No numbering.
- Output hashtags only.` }
        ],
        temperature: 0.8,
        max_tokens: 500
      })
    });
    const data = await response.json();
    if (data.error) { outputBox.innerHTML = "❌ " + data.error.message; return; }
    outputBox.innerHTML = data.choices[0].message.content;
  } catch (error) {
    outputBox.innerHTML = "❌ Error: " + error.message;
  }
}
function copyHashtags() {
  const text = document.getElementById("result").innerText;
  navigator.clipboard.writeText(text);
  alert("✅ Hashtags Copied!");
}
</script>
