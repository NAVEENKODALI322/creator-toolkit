<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral Hook Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="logo">🚀 Creator Toolkit</div>
 <nav class="main-nav">
  <a href="index.html">Home</a>
  <a href="hashtag-generator.html">Hashtag Generator</a>
  <a href="title-generator.html">Title Generator</a>
  <a href="description-generator.html">Description Generator</a>
  <a href="tags-generator.html">Tags Generator</a>
  <a href="thumbnail-downloader.html">Thumbnail Downloader</a>
</nav>
</header>

<div class="container">

  <div class="card">
    <h2>🔥 Viral Hook Generator</h2>
    <p>Enter your topic and get viral hooks instantly</p>

    <input type="text" id="topicInput" placeholder="Enter topic...">
    <button onclick="generateHooks()">Generate Hooks</button>

    <!-- ONLY ONE OUTPUT BOX -->
    <div class="output" id="outputBox">
      Your hooks will appear here...
    </div>

    <button class="copy-btn" onclick="copyHooks()">
      Copy All
    </button>

  </div>

</div>


<script>
async function generateHooks() {

  const topic = document.getElementById("topicInput").value;
  const outputBox = document.getElementById("outputBox");

  if (!topic) {
    outputBox.innerHTML = "⚠️ Please enter a topic!";
    return;
  }

  outputBox.innerHTML = "⏳ Generating viral hooks...";

  const apiKey = "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";

  try {

    const response = await fetch(
      "https://api.groq.com/openai/v1/chat/completions",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + apiKey
        },
        body: JSON.stringify({
          model: "llama-3.1-8b-instant",
          messages: [
            {
              role: "user",
              content:
                `Generate 10 highly viral YouTube hooks for "${topic}".
                
Mix Telugu and English naturally.
Each hook should be on a new line.
Do not number them.`
            }
          ]
        })
      }
    );

    const data = await response.json();

    outputBox.innerHTML =
      data.choices[0].message.content.replace(/\n/g, "<br><br>");

  } catch (error) {

    outputBox.innerHTML =
      "❌ Error: " + error.message;

    console.error(error);
  }
}

function copyHooks() {
  const text = document.getElementById("outputBox").innerText;
  navigator.clipboard.writeText(text);
  alert("Hooks copied!");
}
</script>


</body>
</html>
