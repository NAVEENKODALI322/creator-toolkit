</header>
<div class="container">
<div class="card">
<h2 style="text-align:center;margin-bottom:20px;">📄 Description Generator</h2>
<input type="text" id="topic" placeholder="Enter Video Topic">
<input type="text" id="channel" placeholder="Enter Channel Name">
<input type="text" id="keywords" placeholder="Enter Keywords (comma separated)">
<select id="language">
  <option value="telugu">తెలుగు</option>
  <option value="english">English</option>
  <option value="mix">Telugu + English Mix</option>
</select>
<button class="format-btn" onclick="generateDescription()">Generate Description</button>
<div id="output" class="output"></div>
<button class="copy-btn" style="margin-top:15px;" onclick="copyDescription()">Copy Description</button>
</div>
</div>
<script>
async function generateDescription() {
  const topic = document.getElementById("topic").value.trim();
  const channel = document.getElementById("channel").value.trim();
  const keywords = document.getElementById("keywords").value.trim();
  const language = document.getElementById("language").value;
  const outputBox = document.getElementById("output");

  if (!topic) { outputBox.innerHTML = "⚠️ Please enter a topic!"; return; }
  outputBox.innerHTML = "⏳ Generating...";

  try {
    const response = await fetch("/api/description", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ topic, channel, keywords, language })
    });

    const data = await response.json();

    if (!response.ok) {
      outputBox.innerHTML = "❌ " + (data.error?.message || data.error || "Something went wrong");
      return;
    }

    outputBox.innerHTML = data.description;
  } catch (error) {
    outputBox.innerHTML = "❌ Error: " + error.message;
  }
}

function copyDescription() {
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("✅ Copied!");
}
</script>
